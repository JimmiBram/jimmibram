<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hyperspeed to BramLabs.io</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Orbitron', sans-serif;
      cursor: default;
    }
    canvas#stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }
    #hud {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 2;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #hud-text {
      font-size: clamp(1rem, 3vw, 2.2rem);
      color: #00e5ff;
      text-align: center;
      text-shadow: 0 0 20px #00e5ff, 0 0 60px #00e5ff, 0 0 120px #0077ff;
      letter-spacing: 3px;
      opacity: 0;
      transition: opacity 1.5s ease;
      padding: 0 2rem;
      line-height: 1.6;
    }
    #hud-text.visible { opacity: 1; }
    #speed-indicator {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      pointer-events: none;
      text-align: center;
    }
    #speed-label {
      font-size: clamp(0.6rem, 1.5vw, 0.9rem);
      color: #00e5ff88;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    #speed-value {
      font-size: clamp(1.2rem, 3vw, 2rem);
      font-weight: 900;
      color: #00e5ff;
      text-shadow: 0 0 15px #00e5ff;
    }
    /* Scanline overlay */
    #scanlines {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 4;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 229, 255, 0.015) 2px,
        rgba(0, 229, 255, 0.015) 4px
      );
    }
    /* Corner brackets */
    .corner {
      position: fixed;
      width: 60px; height: 60px;
      z-index: 3;
      pointer-events: none;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: #00e5ff44;
    }
    .tl { top: 20px; left: 20px; }
    .tl::before { top: 0; left: 0; width: 30px; height: 2px; }
    .tl::after { top: 0; left: 0; width: 2px; height: 30px; }
    .tr { top: 20px; right: 20px; }
    .tr::before { top: 0; right: 0; width: 30px; height: 2px; }
    .tr::after { top: 0; right: 0; width: 2px; height: 30px; }
    .bl { bottom: 20px; left: 20px; }
    .bl::before { bottom: 0; left: 0; width: 30px; height: 2px; }
    .bl::after { bottom: 0; left: 0; width: 2px; height: 30px; }
    .br { bottom: 20px; right: 20px; }
    .br::before { bottom: 0; right: 0; width: 30px; height: 2px; }
    .br::after { bottom: 0; right: 0; width: 2px; height: 30px; }
    /* Planet */
    #planet {
      position: fixed;
      z-index: 5;
      pointer-events: auto;
      cursor: pointer;
      border-radius: 50%;
      opacity: 0;
      transition: transform 0.2s ease;
    }
    #planet:hover {
      transform: scale(1.05);
      filter: brightness(1.3);
    }
    #planet-label {
      position: fixed;
      z-index: 6;
      pointer-events: none;
      font-size: clamp(0.9rem, 1.8vw, 1.2rem);
      color: #00e5ff;
      text-shadow: 0 0 10px #00e5ff;
      letter-spacing: 3px;
      opacity: 0;
      text-align: center;
      white-space: nowrap;
    }
    /* Vignette */
    #vignette {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 3;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
    }
    /* Flash overlay for warp effect */
    #flash {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      pointer-events: none;
      background: white;
      opacity: 0;
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  <div id="hud">
    <div id="hud-text"></div>
  </div>
  <div id="speed-indicator">
    <div id="speed-label">Warp Factor</div>
    <div id="speed-value">0.0</div>
  </div>
  <div id="scanlines"></div>
  <div id="vignette"></div>
  <div id="flash"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <canvas id="planet"></canvas>
  <div id="planet-label">[ CLICK TO ENTER ]</div>

  <script>
  (function() {
    // ── STAR FIELD ──────────────────────────────────────
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const NUM_STARS = 1200;
    const stars = [];
    for (let i = 0; i < NUM_STARS; i++) {
      stars.push({
        x: (Math.random() - 0.5) * 2,
        y: (Math.random() - 0.5) * 2,
        z: Math.random() * 4,
        prevX: 0, prevY: 0,
        color: Math.random() < 0.15 ? '#00e5ff' : Math.random() < 0.05 ? '#ff6600' : '#ffffff'
      });
    }

    // ── NEBULA PARTICLES ────────────────────────────────
    const NUM_NEBULA = 80;
    const nebulae = [];
    for (let i = 0; i < NUM_NEBULA; i++) {
      nebulae.push({
        x: (Math.random() - 0.5) * 2,
        y: (Math.random() - 0.5) * 2,
        z: Math.random() * 4 + 1,
        size: Math.random() * 80 + 30,
        hue: Math.random() < 0.5 ? 190 : 260,
        alpha: Math.random() * 0.04 + 0.01
      });
    }

    // ── STATE ───────────────────────────────────────────
    let speed = 0;
    let targetSpeed = 0;
    let phase = 0; // 0=idle, 1=accelerating, 2=hyperspeed, 3=decel+planet
    let phaseTime = 0;
    let startTime = performance.now();
    let planetVisible = false;
    let planetScale = 0;
    let planetTargetScale = 0;
    let shakeIntensity = 0;

    const hudText = document.getElementById('hud-text');
    const speedValue = document.getElementById('speed-value');
    const flash = document.getElementById('flash');
    const planetCanvas = document.getElementById('planet');
    const planetCtx = planetCanvas.getContext('2d');
    const planetLabel = document.getElementById('planet-label');

    // Start sequence after brief pause
    setTimeout(() => { phase = 1; phaseTime = performance.now(); }, 800);

    // ── PLANET DRAWING ──────────────────────────────────
    function drawPlanet(size) {
      const s = Math.max(Math.round(size), 10);
      planetCanvas.width = s;
      planetCanvas.height = s;
      const r = s / 2;
      const pc = planetCtx;

      // Main sphere gradient
      const grad = pc.createRadialGradient(r * 0.65, r * 0.4, r * 0.05, r, r, r);
      grad.addColorStop(0, '#00ffcc');
      grad.addColorStop(0.3, '#0088aa');
      grad.addColorStop(0.7, '#003355');
      grad.addColorStop(1, '#001122');

      pc.beginPath();
      pc.arc(r, r, r - 2, 0, Math.PI * 2);
      pc.fillStyle = grad;
      pc.fill();

      // Surface detail rings
      pc.strokeStyle = 'rgba(0, 229, 255, 0.15)';
      pc.lineWidth = 1.5;
      for (let i = 0; i < 6; i++) {
        const yOff = (i - 2.5) * (r * 0.3);
        pc.beginPath();
        pc.ellipse(r, r + yOff, r * 0.9, r * 0.12, 0, 0, Math.PI * 2);
        pc.stroke();
      }

      // Glow halo
      const glow = pc.createRadialGradient(r, r, r * 0.8, r, r, r * 1.3);
      glow.addColorStop(0, 'rgba(0, 229, 255, 0)');
      glow.addColorStop(0.7, 'rgba(0, 229, 255, 0.08)');
      glow.addColorStop(1, 'rgba(0, 229, 255, 0)');
      pc.fillStyle = glow;
      pc.fillRect(0, 0, s, s);

      // Atmosphere rim
      pc.beginPath();
      pc.arc(r, r, r - 2, 0, Math.PI * 2);
      pc.strokeStyle = 'rgba(0, 229, 255, 0.4)';
      pc.lineWidth = 3;
      pc.stroke();

      // Text on planet
      if (s > 100) {
        const fontSize = Math.max(s * 0.11, 12);
        pc.font = `900 ${fontSize}px 'Orbitron', sans-serif`;
        pc.textAlign = 'center';
        pc.textBaseline = 'middle';
        // "Visit" above
        const subSize = Math.max(fontSize * 0.45, 8);
        pc.font = `400 ${subSize}px 'Orbitron', sans-serif`;
        pc.fillStyle = '#00e5ff99';
        pc.shadowColor = '#00e5ff';
        pc.shadowBlur = 10;
        pc.fillText('Visit', r, r - fontSize * 0.9);
        pc.shadowBlur = 0;

        // "BramLabs.io" center
        pc.font = `900 ${fontSize}px 'Orbitron', sans-serif`;
        pc.fillStyle = '#00ffcc';
        pc.shadowColor = '#00e5ff';
        pc.shadowBlur = 20;
        pc.fillText('BramLabs.io', r, r);
        pc.shadowBlur = 0;

        // "To check out my ventures" below
        pc.font = `400 ${subSize}px 'Orbitron', sans-serif`;
        pc.fillStyle = '#00e5ff99';
        pc.shadowColor = '#00e5ff';
        pc.shadowBlur = 10;
        pc.fillText('To check out my ventures', r, r + fontSize * 0.9);
        pc.shadowBlur = 0;
      }
    }

    // Planet click handler
    planetCanvas.addEventListener('click', () => {
      if (planetVisible) {
        flash.style.transition = 'opacity 0.4s ease';
        flash.style.opacity = '1';
        setTimeout(() => {
          window.location.href = 'https://bramlabs.io';
        }, 500);
      }
    });

    // ── ANIMATION ───────────────────────────────────────
    function animate(now) {
      requestAnimationFrame(animate);
      const dt = 1 / 60;
      const elapsed = (now - startTime) / 1000;

      // Phase management
      const pElapsed = (now - phaseTime) / 1000;

      if (phase === 1) {
        // Accelerating
        targetSpeed = Math.min(pElapsed * 0.8, 3.5);
        shakeIntensity = Math.min(pElapsed * 0.3, 1.5);
        if (pElapsed > 1.5 && pElapsed < 2) {
          hudText.textContent = 'ENGAGING HYPERDRIVE';
          hudText.classList.add('visible');
        }
        if (pElapsed > 3) {
          // Flash to hyperspeed
          flash.style.transition = 'opacity 0.3s ease';
          flash.style.opacity = '0.8';
          setTimeout(() => {
            flash.style.transition = 'opacity 1s ease';
            flash.style.opacity = '0';
          }, 300);
          phase = 2;
          phaseTime = now;
          targetSpeed = 8;
        }
      } else if (phase === 2) {
        // Hyperspeed cruise
        shakeIntensity = 0.5;
        if (pElapsed > 0.5) {
          hudText.classList.remove('visible');
        }
        if (pElapsed > 4) {
          phase = 3;
          phaseTime = now;
          targetSpeed = 0.3;
        }
      } else if (phase === 3) {
        // Decelerate and show planet
        shakeIntensity = Math.max(0, 1 - pElapsed * 0.5);
        if (pElapsed > 1) {
          hudText.classList.remove('visible');
        }
        if (pElapsed > 2) {
          planetVisible = true;
          const maxSize = Math.min(W, H) * 0.45;
          planetTargetScale = maxSize;
        }
        targetSpeed = Math.max(0.15, 0.3 - pElapsed * 0.02);
      }

      // Smooth speed transition
      speed += (targetSpeed - speed) * 0.03;

      // Speed display
      const warpFactor = (speed / 8 * 9.9).toFixed(1);
      speedValue.textContent = warpFactor;
      if (speed > 5) {
        speedValue.style.color = '#ff4400';
        speedValue.style.textShadow = '0 0 20px #ff4400';
      } else if (speed > 2) {
        speedValue.style.color = '#ffaa00';
        speedValue.style.textShadow = '0 0 15px #ffaa00';
      } else {
        speedValue.style.color = '#00e5ff';
        speedValue.style.textShadow = '0 0 15px #00e5ff';
      }

      // Shake
      const sx = (Math.random() - 0.5) * shakeIntensity * 2;
      const sy = (Math.random() - 0.5) * shakeIntensity * 2;

      // Clear
      ctx.fillStyle = `rgba(0, 2, 8, ${speed > 3 ? 0.15 : 0.3})`;
      ctx.fillRect(0, 0, W, H);

      const cx = W / 2 + sx;
      const cy = H / 2 + sy;

      // Draw nebula blobs
      for (const n of nebulae) {
        n.z -= speed * dt * 0.3;
        if (n.z < 0.1) {
          n.z = 4 + Math.random();
          n.x = (Math.random() - 0.5) * 2;
          n.y = (Math.random() - 0.5) * 2;
        }
        const sx2 = (n.x / n.z) * W + cx;
        const sy2 = (n.y / n.z) * H + cy;
        const sz = n.size / n.z;
        const grad = ctx.createRadialGradient(sx2, sy2, 0, sx2, sy2, sz);
        grad.addColorStop(0, `hsla(${n.hue}, 100%, 50%, ${n.alpha * (1 + speed * 0.1)})`);
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.fillRect(sx2 - sz, sy2 - sz, sz * 2, sz * 2);
      }

      // Draw stars
      for (const star of stars) {
        star.prevX = (star.x / star.z) * W + cx;
        star.prevY = (star.y / star.z) * H + cy;

        star.z -= speed * dt;
        if (star.z < 0.01) {
          star.z = 4;
          star.x = (Math.random() - 0.5) * 2;
          star.y = (Math.random() - 0.5) * 2;
          star.prevX = (star.x / star.z) * W + cx;
          star.prevY = (star.y / star.z) * H + cy;
        }

        const sx2 = (star.x / star.z) * W + cx;
        const sy2 = (star.y / star.z) * H + cy;

        const brightness = Math.min(1, (1 - star.z / 4) * (1 + speed * 0.3));
        const lineWidth = Math.max(0.5, (1 - star.z / 4) * 2 * (1 + speed * 0.3));

        ctx.beginPath();
        ctx.moveTo(star.prevX, star.prevY);
        ctx.lineTo(sx2, sy2);
        ctx.strokeStyle = star.color;
        ctx.globalAlpha = brightness;
        ctx.lineWidth = lineWidth;
        ctx.stroke();
        ctx.globalAlpha = 1;

        // Star head glow
        if (speed < 2 && star.z < 1) {
          ctx.beginPath();
          ctx.arc(sx2, sy2, 1.5, 0, Math.PI * 2);
          ctx.fillStyle = star.color;
          ctx.fill();
        }
      }

      // Center warp glow during hyperspeed
      if (speed > 2) {
        const glowSize = speed * 40;
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowSize);
        grad.addColorStop(0, `rgba(0, 100, 255, ${speed * 0.02})`);
        grad.addColorStop(0.5, `rgba(0, 50, 150, ${speed * 0.01})`);
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.fillRect(cx - glowSize, cy - glowSize, glowSize * 2, glowSize * 2);
      }

      // Chromatic tunnel rings during high speed
      if (speed > 4) {
        const ringCount = 5;
        for (let i = 0; i < ringCount; i++) {
          const progress = ((elapsed * 2 + i * 0.4) % 2) / 2;
          const ringR = progress * Math.max(W, H) * 0.8;
          const alpha = (1 - progress) * 0.08;
          ctx.beginPath();
          ctx.arc(cx, cy, ringR, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(0, 229, 255, ${alpha})`;
          ctx.lineWidth = 2;
          ctx.stroke();
        }
      }

      // ── PLANET ─────────────────────────────────────
      if (planetVisible) {
        planetScale += (planetTargetScale - planetScale) * 0.02;
        const ps = Math.round(planetScale);
        if (ps > 20) {
          drawPlanet(ps);
          planetCanvas.style.width = ps + 'px';
          planetCanvas.style.height = ps + 'px';
          planetCanvas.style.left = (W / 2 - ps / 2) + 'px';
          planetCanvas.style.top = (H / 2 - ps / 2) + 'px';
          planetCanvas.style.opacity = Math.min(1, (ps - 20) / 100);

          // Label positioning
          planetLabel.style.left = (W / 2 - 200) + 'px';
          planetLabel.style.width = '400px';
          planetLabel.style.top = (H / 2 + ps / 2 + 20) + 'px';
          planetLabel.style.opacity = Math.min(1, (ps - 60) / 100);

          // Pulsing glow on planet
          const pulseGlow = 10 + Math.sin(elapsed * 3) * 8;
          planetCanvas.style.boxShadow = `0 0 ${pulseGlow}px #00e5ff, 0 0 ${pulseGlow * 3}px rgba(0,229,255,0.3)`;
        }
      }

      // HUD flicker effect
      if (Math.random() < 0.005) {
        hudText.style.opacity = '0.3';
        setTimeout(() => { hudText.style.opacity = ''; }, 80);
      }
    }

    requestAnimationFrame(animate);
  })();
  </script>
</body>
</html>
